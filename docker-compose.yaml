# Local development orchestration for the AI Mission Assistant.
#
# Strategy (Hybrid / Option A):
#   - Postgres + Supabase services are managed separately by the Supabase CLI:
#         npx supabase start
#     The CLI owns DB lifecycle, migrations (./supabase/migrations), and seeds.
#   - This compose file orchestrates the *application* services only:
#         frontend (Vite), backend (Express), vector (log aggregator).
#
# The backend reaches the local Supabase API/DB through `host.docker.internal`,
# which is automatic on Docker Desktop and bridged on Linux via the
# `host-gateway` extra_hosts entry.
#
# Run order:
#   1. npx supabase start
#   2. docker compose up
#
# If containers show missing modules or broken proxy to `backend:3001`, reset images & volumes:
#   1. docker compose down -v
#   2. docker compose build --no-cache
#   3. docker compose up
#
# Build context is the repo root so Docker sees root `package-lock.json` (npm workspaces).
# Bind mounts align with WORKDIR `/repo`: hoisted deps stay under `/repo/node_modules`.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    container_name: ai-mission-assistant-demo-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      # Local-Docker overrides. Production values are set in Render's dashboard.
      PORT: 3001
      LISTEN_HOST: "0.0.0.0"
      # Browser Origin is always the host URL (localhost:5173), not a container hostname.
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      # Reach host Supabase CLI from inside the backend container (not localhost).
      SUPABASE_URL: http://host.docker.internal:54321
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/repo/backend
      - /repo/node_modules
      - /repo/backend/node_modules
    command: >
      sh -c "echo 'Waiting for Supabase API at host.docker.internal:54321 (max 120s)...';
      i=0;
      until node -e \"fetch('http://host.docker.internal:54321/rest/v1/').then(()=>process.exit(0)).catch(()=>process.exit(1))\" 2>/dev/null; do
        i=$$((i+1));
        if [ $$i -ge 60 ]; then
          echo 'WARN: Supabase not reachable. Starting backend anyway (/analyze works; mission DB routes need npx supabase start).';
          break;
        fi;
        sleep 2;
      done;
      echo 'Syncing dependencies...';
      cd /repo && npm install;
      echo 'Starting backend.';
      npm run dev --workspace backend"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    networks:
      - app
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    container_name: ai-mission-assistant-demo-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    environment:
      # Vite dev proxy: use Compose service DNS (backend), never localhost inside this container.
      VITE_PROXY_TARGET: http://backend:3001
      # Browser Supabase client must match the DB the backend writes to (local CLI, not production .env).
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
    volumes:
      - ./frontend:/repo/frontend
      - /repo/node_modules
      - /repo/frontend/node_modules
    command: >
      sh -c "cd /repo && npm install &&
      npm run dev --workspace frontend -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  vector:
    image: timberio/vector:0.34.2-debian
    container_name: ai-mission-assistant-demo-vector
    user: root
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./vector.yaml:/etc/vector/vector.yaml:ro
    networks:
      - app
    restart: unless-stopped

networks:
  app:
    driver: bridge
