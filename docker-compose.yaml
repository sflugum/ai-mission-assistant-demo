# Local development orchestration for the AI Mission Assistant.
#
# Strategy (Hybrid / Option A):
#   - Postgres + Supabase services are managed separately by the Supabase CLI:
#         npx supabase start
#     The CLI owns DB lifecycle, migrations (./supabase/migrations), and seeds.
#   - This compose file orchestrates the *application* services only:
#         frontend (Vite), backend (Express), vector (log aggregator).
#
# The backend reaches the local Supabase API/DB through `host.docker.internal`,
# which is automatic on Docker Desktop and bridged on Linux via the
# `host-gateway` extra_hosts entry.
#
# Run order:
#   1. npx supabase start
#   2. docker compose up

services:
  backend:
    build:
      context: ./backend
      target: dev
    container_name: ai-mission-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      # Local-Docker overrides. Production values are set in Render's dashboard.
      PORT: 3001
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      SUPABASE_URL: http://host.docker.internal:54321
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - /app/node_modules
    # Wait for the Supabase API to accept connections before starting nodemon.
    # (The DB lives in the Supabase CLI's compose, so a `depends_on` isn't possible.)
    command: >
      sh -c "echo 'Waiting for Supabase API at host.docker.internal:54321...';
      until node -e \"fetch('http://host.docker.internal:54321/rest/v1/').then(()=>process.exit(0)).catch(()=>process.exit(1))\" 2>/dev/null; do sleep 2; done;
      echo 'Supabase reachable. Starting backend.';
      npm run dev"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: ai-mission-frontend
    ports:
      - "5173:5173"
    environment:
      # Tells vite.config.js to proxy /analyze to the backend service over the compose network.
      VITE_PROXY_TARGET: http://backend:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  vector:
    image: timberio/vector:0.34.2-debian
    container_name: ai-mission-vector
    user: root
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./vector.yaml:/etc/vector/vector.yaml:ro
    restart: unless-stopped
