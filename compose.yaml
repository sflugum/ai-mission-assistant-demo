services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    container_name: ai-mission-assistant-demo-backend
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    environment:
      PORT: 3001
      LISTEN_HOST: "0.0.0.0"
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./backend:/repo/backend
      - /repo/node_modules
      - /repo/backend/node_modules
    command: >
      sh -c "echo 'Syncing dependencies...';
      cd /repo && npm install;
      echo 'Starting backend.';
      npm run dev --workspace backend"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    container_name: ai-mission-assistant-demo-frontend
    ports:
      - "127.0.0.1:5173:5173"
    env_file:
      - .env
    environment:
      VITE_PROXY_TARGET: http://backend:3001
      VITE_API_URL: ""
    volumes:
      - ./frontend:/repo/frontend
      - /repo/node_modules
      - /repo/frontend/node_modules
    command: >
      sh -c "cd /repo && npm install &&
      npm run dev --workspace frontend -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  vector:
    image: timberio/vector:0.34.2-debian
    container_name: ai-mission-assistant-demo-vector
    user: root
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./vector.yaml:/etc/vector/vector.yaml:ro
    networks:
      - app
    restart: unless-stopped

networks:
  app:
    driver: bridge