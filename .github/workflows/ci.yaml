name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase local stack
        if: false # TODO: Reenable once db migration is complete
        run: npx supabase start

      - name: Run database tests and unit tests
        if: false # TODO: Reenable once db migration is complete
        run: npm run test:run

      - name: Install Playwright browsers
        if: false # TODO: Reenable once db migration is complete
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: false # TODO: Reenable once db migration is complete
        run: npm run test:e2e
        env:
          VITE_SUPABASE_URL: https://nzbcsruutdgtwkugmktt.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_XnkWn46V8M-tBvcrd_cpUA_nvbvlvA6

      - name: Build frontend
        if: false # TODO: Reenable once db migration is complete
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://nzbcsruutdgtwkugmktt.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_XnkWn46V8M-tBvcrd_cpUA_nvbvlvA6

      - name: Upload Playwright report
        if: false # TODO: Reenable once db migration is complete
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
