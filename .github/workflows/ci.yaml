name: CI

on:
  push:
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create Neon Branch (PR Only)
        id: create_neon_branch
        if: github.event_name == 'pull_request'
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ci/pr-${{ github.event.number }}-run-${{ github.run_id }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Run Database Migrations
        if: github.event_name == 'pull_request'
        run: npm run migrate
        env:
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}

      - name: Run unit tests
        working-directory: frontend
        run: npm run test:run

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          # Uses the ephemeral branch URL during PRs, falls back to a primary/staging DB for direct pushes
          DATABASE_URL: ${{ github.event_name == 'pull_request' && steps.create_neon_branch.outputs.db_url_with_pooler || secrets.DATABASE_URL }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Delete Neon Branch
        if: always() && github.event_name == 'pull_request'
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ci/pr-${{ github.event.number }}-run-${{ github.run_id }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30